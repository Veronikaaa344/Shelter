<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🗄️ Shelter DB — Тест бази даних</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0f1a;
      --surface: #151828;
      --surface2: #1e2235;
      --border: #2a2f4a;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --green: #22d3a5;
      --red: #f87171;
      --yellow: #fbbf24;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --russian-bg: rgba(248, 113, 113, 0.12);
      --russian-border: rgba(248, 113, 113, 0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 24px;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .header-icon { font-size: 2.4rem; }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent2), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 2px; }

    /* ── CONTROLS ── */
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    button {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #btn-load {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }
    #btn-load:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(108,99,255,0.4); }

    #btn-find-ru {
      background: var(--surface2);
      color: var(--yellow);
      border: 1px solid var(--border);
    }
    #btn-find-ru:hover { border-color: var(--yellow); transform: translateY(-1px); }

    #btn-collapse {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    #btn-collapse:hover { border-color: var(--accent); color: var(--text); transform: translateY(-1px); }

    /* ── STATUS BAR ── */
    #status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      margin-bottom: 20px;
      font-size: 0.88rem;
      min-height: 44px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .dot.red   { background: var(--red);   box-shadow: 0 0 8px var(--red); }
    .dot.yellow{ background: var(--yellow); box-shadow: 0 0 8px var(--yellow); animation: pulse 1s ease infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── SUMMARY CARDS ── */
    #summary {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: var(--accent); }
    .stat-card .label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-card .value { font-size: 1.6rem; font-weight: 700; color: var(--accent2); }
    .stat-card .sub   { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

    /* ── RUSSIAN BANNER ── */
    #ru-banner {
      display: none;
      align-items: flex-start;
      gap: 12px;
      padding: 16px;
      background: var(--russian-bg);
      border: 1px solid var(--russian-border);
      border-radius: 12px;
      margin-bottom: 20px;
      animation: fadeIn 0.3s ease;
    }
    #ru-banner.visible { display: flex; }
    #ru-banner .icon { font-size: 1.6rem; flex-shrink: 0; }
    #ru-banner h3 { color: var(--red); font-size: 1rem; margin-bottom: 6px; }
    #ru-banner ul { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    #ru-banner li {
      font-size: 0.82rem;
      color: var(--text);
      background: rgba(248,113,113,0.08);
      border-radius: 6px;
      padding: 4px 10px;
      font-family: 'JetBrains Mono', monospace;
    }
    #ru-banner li .path { color: var(--yellow); margin-right: 6px; }

    /* ── COLLECTIONS ── */
    #collections { display: flex; flex-direction: column; gap: 20px; }

    .collection {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .collection-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }
    .collection-header:hover { background: #252a42; }
    .collection-header h2 { font-size: 1rem; font-weight: 600; flex: 1; }
    .coll-badge {
      background: var(--accent);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .coll-badge.ru-badge { background: var(--red); }
    .chevron { color: var(--text-muted); transition: transform 0.25s; font-size: 0.9rem; }
    .collection.collapsed .chevron { transform: rotate(-90deg); }
    .collection.collapsed .collection-body { display: none; }

    /* ── DOCUMENTS ── */
    .collection-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    .doc-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .doc-card:hover { border-color: var(--accent); }
    .doc-card.has-russian { border-color: var(--russian-border); }

    .doc-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .doc-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      flex: 1;
    }
    .doc-title { font-size: 0.88rem; font-weight: 500; }
    .ru-tag {
      font-size: 0.7rem;
      color: var(--red);
      background: var(--russian-bg);
      border: 1px solid var(--russian-border);
      border-radius: 6px;
      padding: 2px 8px;
    }

    .doc-body { padding: 14px; }
    .doc-body pre {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
    }

    /* Russian text highlighting inside JSON */
    .ru-highlight {
      background: rgba(248,113,113,0.2);
      border: 1px solid rgba(248,113,113,0.4);
      border-radius: 3px;
      padding: 0 3px;
      color: #fca5a5;
    }

    /* ── EMPTY / LOADING ── */
    .empty {
      text-align: center;
      color: var(--text-muted);
      padding: 40px;
      font-size: 0.95rem;
    }

    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
  </style>
</head>
<body>

<header>
  <div class="header-icon">🗄️</div>
  <div>
    <h1>Shelter — Тест бази даних</h1>
    <p>Перегляд усіх колекцій MongoDB + виявлення тексту на інших мовах</p>
  </div>
</header>

<div class="controls">
  <button id="btn-load">
    <span>🔄</span> Завантажити дані з БД
  </button>
  <button id="btn-find-ru">
    <span>🔍</span> Знайти російський текст
  </button>
  <button id="btn-collapse">
    <span>📂</span> Згорнути / розгорнути все
  </button>
</div>

<div id="status-bar">
  <div class="dot yellow"></div>
  <span id="status-text">Очікування… Натисни «Завантажити дані з БД»</span>
</div>

<div id="summary"></div>

<div id="ru-banner">
  <div class="icon">⚠️</div>
  <div>
    <h3>Виявлено текст на російській мові</h3>
    <ul id="ru-list"></ul>
  </div>
</div>

<div id="collections"></div>

<script>
  const API = 'http://localhost:5000';
  let allData = null;
  let allCollapsed = false;

  // ── RUSSIAN DETECTION ──────────────────────────────────────────
  // Cyrillic chars shared by Ukrainian & Russian, BUT Russian-only letters
  // are: ё Ё ъ Ъ ы Ы э Э
  // We also look for common Russian words / patterns in field values.

  const RU_ONLY_CHARS = /[ёЁъЪыЫэЭ]/;

  // Russian-specific words (those not used in Ukrainian)
  const RU_WORDS = [
    'использования', 'использовать', 'использование',
    'обновляем', 'обновление', 'обновить',
    'минутах', 'минута', 'минут',
    'подряд', 'статистика', 'статистике', 'статистики',
    'позитивный', 'нейтральный', 'негативный',
    'общая', 'общей', 'общие', 'общий',
    'резильентность', 'резильентности',
    'методы', 'метод',
    'тестируем', 'тестируемый',
    'коллекций', 'коллекция',
    'находим', 'показываем', 'проверяем', 'добавляем',
    'запрос',
  ];

  const RU_WORDS_RE = new RegExp('\\b(' + RU_WORDS.join('|') + ')\\b', 'gi');

  function detectRussian(text) {
    if (!text) return false;
    if (RU_ONLY_CHARS.test(text)) return true;
    if (RU_WORDS_RE.test(text)) return true;
    return false;
  }

  function findRussianInObject(obj, path = '') {
    const hits = [];
    if (typeof obj === 'string') {
      if (detectRussian(obj)) hits.push({ path, snippet: obj.slice(0, 120) });
      return hits;
    }
    if (Array.isArray(obj)) {
      obj.forEach((v, i) => hits.push(...findRussianInObject(v, `${path}[${i}]`)));
      return hits;
    }
    if (obj && typeof obj === 'object') {
      for (const [k, v] of Object.entries(obj)) {
        hits.push(...findRussianInObject(v, path ? `${path}.${k}` : k));
      }
    }
    return hits;
  }

  // ── SYNTAX-HIGHLIGHT JSON with Russian marks ───────────────────
  function highlightJSON(json) {
    // Escape HTML
    let str = JSON.stringify(json, null, 2)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    // Basic JSON syntax colors
    str = str.replace(/"((?:[^"\\]|\\.)*)"\s*:/g,
      '<span style="color:#a78bfa">"$1"</span>:');
    str = str.replace(/:\s*"((?:[^"\\]|\\.)*)"/g, (m, v) => {
      const cls = detectRussian(v) ? ' class="ru-highlight"' : '';
      return `: <span${cls}">${escapeJSON(v)}"</span>`;
    });

    return str;
  }

  function escapeJSON(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── RENDER ─────────────────────────────────────────────────────
  function setStatus(icon, text, state = 'yellow') {
    const dot = document.querySelector('#status-bar .dot');
    dot.className = `dot ${state}`;
    document.getElementById('status-text').textContent = `${icon} ${text}`;
  }

  function renderSummary(data) {
    const s = document.getElementById('summary');
    s.innerHTML = `
      <div class="stat-card">
        <div class="label">База даних</div>
        <div class="value" style="font-size:1.1rem;color:var(--green)">${data.database}</div>
      </div>
      <div class="stat-card">
        <div class="label">Колекцій</div>
        <div class="value">${data.collections.length}</div>
      </div>
      <div class="stat-card">
        <div class="label">Документів загалом</div>
        <div class="value">${data.totalDocuments}</div>
      </div>
      ${data.collections.map(c => `
        <div class="stat-card">
          <div class="label">${c.name}</div>
          <div class="value">${c.count}</div>
          <div class="sub">документів</div>
        </div>
      `).join('')}
    `;
  }

  function renderCollections(data) {
    const container = document.getElementById('collections');
    container.innerHTML = '';

    data.collections.forEach(coll => {
      const ruDocs = coll.documents.filter(d => findRussianInObject(d).length > 0);
      const hasRu = ruDocs.length > 0;

      const collEl = document.createElement('div');
      collEl.className = 'collection';
      collEl.dataset.name = coll.name;

      collEl.innerHTML = `
        <div class="collection-header">
          <h2>📋 ${coll.name}</h2>
          <span class="coll-badge">${coll.count} docs</span>
          ${hasRu ? `<span class="coll-badge ru-badge">🇷🇺 ${ruDocs.length} з рос. текстом</span>` : ''}
          <span class="chevron">▼</span>
        </div>
        <div class="collection-body">
          ${coll.documents.length === 0
            ? '<div class="empty">Колекція порожня</div>'
            : coll.documents.map(doc => renderDoc(doc)).join('')
          }
        </div>
      `;

      collEl.querySelector('.collection-header').addEventListener('click', () => {
        collEl.classList.toggle('collapsed');
      });

      container.appendChild(collEl);
    });
  }

  function renderDoc(doc) {
    const ruHits = findRussianInObject(doc);
    const hasRu = ruHits.length > 0;
    const title = doc.title || doc.name || doc.text || doc.username || doc.email || '';
    const id = doc._id ? String(doc._id).slice(-8) : '?';

    return `
      <div class="doc-card ${hasRu ? 'has-russian' : ''}">
        <div class="doc-header" onclick="this.closest('.doc-card').querySelector('.doc-body').classList.toggle('hidden')">
          <span class="doc-id">…${id}</span>
          ${title ? `<span class="doc-title">${title.slice(0, 60)}</span>` : ''}
          ${hasRu ? `<span class="ru-tag">⚠️ рос. текст (${ruHits.length})</span>` : ''}
        </div>
        <div class="doc-body">
          <pre>${highlightJSON(doc)}</pre>
          ${hasRu ? `
            <div style="margin-top:10px;padding:10px;background:var(--russian-bg);border:1px solid var(--russian-border);border-radius:8px;">
              <div style="font-size:0.78rem;color:var(--red);font-weight:600;margin-bottom:6px;">Знайдений текст на іншій мові:</div>
              ${ruHits.map(h => `
                <div style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;margin-bottom:4px;">
                  <span style="color:var(--yellow)">${h.path}</span>:
                  <span style="color:#fca5a5"> "${h.snippet}"</span>
                </div>
              `).join('')}
            </div>
          ` : ''}
        </div>
      </div>
    `;
  }

  function renderRuBanner(data) {
    const banner = document.getElementById('ru-banner');
    const list   = document.getElementById('ru-list');
    const allHits = [];

    data.collections.forEach(coll => {
      coll.documents.forEach(doc => {
        const hits = findRussianInObject(doc);
        hits.forEach(h => {
          allHits.push({ collection: coll.name, path: h.path, snippet: h.snippet });
        });
      });
    });

    if (allHits.length === 0) {
      banner.classList.remove('visible');
      return;
    }

    banner.classList.add('visible');
    list.innerHTML = allHits.map(h => `
      <li><span class="path">[${h.collection}] ${h.path}:</span>${h.snippet.slice(0, 80)}</li>
    `).join('');
  }

  // ── FETCH DATA ─────────────────────────────────────────────────
  async function loadData() {
    setStatus('⏳', 'Підключення до сервера…', 'yellow');
    document.getElementById('summary').innerHTML = '';
    document.getElementById('collections').innerHTML = '';
    document.getElementById('ru-banner').classList.remove('visible');

    try {
      const res = await fetch(`${API}/api/db-dump`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      allData = await res.json();

      renderSummary(allData);
      renderCollections(allData);
      renderRuBanner(allData);

      const ruCount = allData.collections.reduce((acc, c) =>
        acc + c.documents.filter(d => findRussianInObject(d).length > 0).length, 0);

      setStatus('✅', `Завантажено ${allData.totalDocuments} документів із ${allData.collections.length} колекцій. ${ruCount > 0 ? `⚠️ ${ruCount} документів з рос. текстом!` : '✓ Рос. тексту не знайдено.'}`, 'green');
    } catch (e) {
      setStatus('❌', `Помилка: ${e.message} — переконайся, що backend запущено (npm start у /backend)`, 'red');
    }
  }

  // ── FIND RUSSIAN ───────────────────────────────────────────────
  function highlightRussian() {
    if (!allData) { alert('Спочатку завантаж дані!'); return; }
    // Scroll to banner
    const banner = document.getElementById('ru-banner');
    if (banner.classList.contains('visible')) {
      banner.scrollIntoView({ behavior: 'smooth', block: 'start' });
    } else {
      setStatus('✅', 'Рос. текст у документах БД не знайдено!', 'green');
    }
    // Expand collections that have russian
    document.querySelectorAll('.collection').forEach(c => {
      const hasBadge = c.querySelector('.ru-badge');
      if (hasBadge) c.classList.remove('collapsed');
    });
  }

  // ── COLLAPSE ALL ───────────────────────────────────────────────
  function toggleAll() {
    allCollapsed = !allCollapsed;
    document.querySelectorAll('.collection').forEach(c => {
      c.classList.toggle('collapsed', allCollapsed);
    });
  }

  // ── EVENTS ────────────────────────────────────────────────────
  document.getElementById('btn-load').addEventListener('click', loadData);
  document.getElementById('btn-find-ru').addEventListener('click', highlightRussian);
  document.getElementById('btn-collapse').addEventListener('click', toggleAll);
</script>
</body>
</html>
